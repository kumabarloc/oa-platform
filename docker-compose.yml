version: '3.8'

services:
  # ========================
  # MySQL 数据库
  # ========================
  mysql:
    image: mysql:8.0
    container_name: oa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: oa_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --skip-name-resolve
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Redis 缓存（可选）
  # ========================
  redis:
    image: redis:7-alpine
    container_name: oa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ========================
  # Spring Boot 后端
  # ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oa-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: oa_platform
      DATABASE_USER: root
      DATABASE_PASSWORD: "123456"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: oa-platform-secret-key-must-be-at-least-32-chars-long!!
      JWT_EXPIRATION: 7200000
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs

  # ========================
  # Vue 前端（Nginx）
  # ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oa-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  default:
    name: oa-network