# 生产环境配置（Docker 部署使用）
# 所有敏感信息通过环境变量注入，不写在文件里

server:
  port: 8080

spring:
  application:
    name: oa-platform

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:oa_platform}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASSWORD:123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    sql-prefix: V
    encoding: UTF-8
    validate-on-migrate: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.oa.**.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

flowable:
  async-history-enabled: true
  db-history-used: true
  check-process-definitions: false

security:
  jwt:
    secret: ${JWT_SECRET:oa-platform-secret-key-must-be-at-least-32-chars-long!!}
    expiration: ${JWT_EXPIRATION:7200000}

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: INFO
    com.oa: INFO
  file:
    name: /app/logs/oa-platform.log